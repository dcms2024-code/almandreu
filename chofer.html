<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a56e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Almandreu Chófer">
<title>Almandreu — Chófer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
:root{--bg:#f0f2f7;--white:#fff;--border:#e2e6ef;--accent:#1a56e8;--accent-light:#e8eefb;--green:#0db96a;--green-light:#e6f9f0;--orange:#f5a623;--red:#e83a3a;--red-light:#fdeaea;--text:#0f1623;--muted:#8a93a8;--font:'Inter',sans-serif;--font-title:'Bebas Neue',sans-serif;--radius:16px;--shadow:0 2px 16px rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:var(--font);color:var(--text);min-height:100vh;min-height:100dvh}
.screen{display:none;min-height:100vh;min-height:100dvh;flex-direction:column}
.screen.active{display:flex}
#screen-login{background:linear-gradient(160deg,#0f1623 0%,#1a2540 50%,#1a56e8 100%);align-items:center;justify-content:center;padding:32px 24px;gap:0}
.login-logo{font-family:var(--font-title);font-size:52px;letter-spacing:6px;color:#fff;line-height:1;margin-bottom:4px;text-align:center}
.login-sub{font-size:11px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:48px;text-align:center}
.login-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:32px 24px;width:100%;max-width:360px}
.login-label{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:12px;display:block}
.plate-input{width:100%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.15);border-radius:12px;padding:18px 20px;font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:8px;color:#fff;text-align:center;text-transform:uppercase;outline:none;transition:border-color 0.2s;margin-bottom:20px}
.plate-input::placeholder{color:rgba(255,255,255,0.2);font-size:20px;letter-spacing:4px}
.plate-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:18px;background:var(--accent);border:none;border-radius:12px;font-family:var(--font);font-size:15px;font-weight:700;letter-spacing:1px;color:#fff;cursor:pointer;text-transform:uppercase}
.login-btn:active{transform:scale(0.97)}
.login-error{margin-top:14px;padding:12px 16px;background:rgba(232,58,58,0.15);border:1px solid rgba(232,58,58,0.3);border-radius:10px;font-size:13px;color:#ffaaaa;text-align:center;display:none}
.login-error.show{display:block}
.app-header{background:var(--text);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.app-header-left{display:flex;flex-direction:column;gap:2px}
.app-header-logo{font-family:var(--font-title);font-size:22px;letter-spacing:3px;color:#fff;line-height:1}
.app-header-driver{font-size:12px;color:rgba(255,255,255,0.5);font-weight:500}
.plate-badge{font-family:var(--font-title);font-size:18px;letter-spacing:3px;background:var(--accent);color:#fff;padding:6px 14px;border-radius:8px}
.logout-btn{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px}
.sync-bar{background:#111827;padding:4px 20px 8px;display:flex;align-items:center;gap:6px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background 0.3s}
.sync-dot.online{background:var(--green)}
.sync-dot.offline{background:var(--red)}
.sync-text{font-size:11px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,0.4)}
.orders-scroll{flex:1;overflow-y:auto;padding:20px 16px 32px}
.day-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;margin-top:8px;padding-left:4px}
.order-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;border:1.5px solid transparent}
.order-card.urgent{border-color:var(--red)}
.order-card.done{border-color:var(--green);opacity:0.72}
.card-top{padding:16px 18px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-id{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.card-client{font-size:17px;font-weight:700;color:var(--text);line-height:1.2}
.card-badge{flex-shrink:0;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}
.badge-pending{background:#fff4e0;color:var(--orange)}
.badge-transit{background:var(--accent-light);color:var(--accent)}
.badge-done{background:var(--green-light);color:var(--green)}
.badge-urgent{background:var(--red-light);color:var(--red)}
.card-route{padding:0 18px 14px;display:flex;flex-direction:column;gap:8px}
.route-row{display:flex;align-items:flex-start;gap:10px;font-size:14px}
.route-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.route-text{color:var(--text);line-height:1.3}
.route-div{width:1px;height:12px;background:var(--border);margin-left:12px}
.card-meta{padding:10px 18px;background:var(--bg);display:flex;gap:16px;flex-wrap:wrap}
.meta-item{display:flex;flex-direction:column;gap:2px}
.meta-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.meta-value{font-size:13px;font-weight:600;color:var(--text)}
.card-notes{padding:10px 18px;font-size:13px;color:var(--muted);background:#fffbf0;border-top:1px solid #ffe9a0;display:flex;gap:8px}
.card-codigo{padding:14px 18px;background:linear-gradient(135deg,#0f1623,#1a56e8);display:flex;align-items:center;justify-content:space-between;gap:12px}
.codigo-label{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-bottom:4px}
.codigo-value{font-family:'Courier New',monospace;font-size:28px;font-weight:700;color:#fff;letter-spacing:5px}
.copy-btn{background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.3);border-radius:10px;padding:10px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.card-action{padding:14px 18px;border-top:1px solid var(--border)}
.confirm-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:12px;font-family:var(--font);font-size:15px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.confirm-btn:active{transform:scale(0.97)}
.done-summary{padding:12px 18px;border-top:1px solid var(--border);background:var(--green-light)}
.done-summary-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green)}
.done-summary-data{font-size:13px;color:#0a7a47;font-weight:500;margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:8px 0 max(24px,env(safe-area-inset-bottom));animation:slideUp 0.28s cubic-bezier(0.32,0.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px}
.modal-title{font-size:20px;font-weight:800;color:var(--text);padding:0 24px;margin-bottom:4px}
.modal-subtitle{font-size:13px;color:var(--muted);padding:0 24px;margin-bottom:24px}
.modal-field{padding:0 24px;margin-bottom:20px}
.modal-label{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.modal-input{width:100%;padding:20px 18px;background:var(--bg);border:2px solid var(--border);border-radius:12px;font-family:var(--font);font-size:40px;font-weight:700;color:var(--text);text-align:center;outline:none;transition:border-color 0.2s;-moz-appearance:textfield}
.modal-input::-webkit-outer-spin-button,.modal-input::-webkit-inner-spin-button{-webkit-appearance:none}
.modal-input:focus{border-color:var(--accent);background:var(--accent-light)}
.modal-warn{margin:0 24px 20px;padding:12px 16px;background:#fff4e0;border-radius:10px;font-size:13px;color:#a06000;display:none}
.modal-warn.show{display:block}
.modal-submit{margin:0 24px;width:calc(100% - 48px);padding:18px;background:var(--green);border:none;border-radius:14px;font-family:var(--font);font-size:16px;font-weight:800;color:#fff;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.modal-submit:active{transform:scale(0.97)}
.modal-submit:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.modal-cancel{display:block;text-align:center;padding:16px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;background:none;border:none;width:100%}
.history-scroll{flex:1;overflow-y:auto;padding:20px 16px 32px}
.hist-card{background:var(--white);border-radius:14px;box-shadow:var(--shadow);margin-bottom:12px;padding:16px 18px;display:flex;align-items:center;gap:14px}
.hist-icon{font-size:28px;flex-shrink:0}
.hist-info{flex:1}
.hist-client{font-size:15px;font-weight:700}
.hist-detail{font-size:12px;color:var(--muted);margin-top:2px}
.hist-kg{font-family:var(--font-title);font-size:24px;letter-spacing:1px;color:var(--green);white-space:nowrap;text-align:right}
.hist-kg span{font-size:12px;font-weight:600;display:block;color:var(--muted);font-family:var(--font)}
.bottom-nav{background:var(--white);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));position:sticky;bottom:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;cursor:pointer;font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted)}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:22px}
.nav-badge{position:relative;display:inline-block}
.badge-count{position:absolute;top:-4px;right:-8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.empty-state{text-align:center;padding:60px 24px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.empty-icon{font-size:56px}
.empty-title{font-size:18px;font-weight:700;color:var(--text)}
.empty-sub{font-size:14px;color:var(--muted)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:14px 24px;border-radius:50px;font-size:14px;font-weight:600;opacity:0;transition:all 0.3s;z-index:300;white-space:nowrap;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-logo">ALMANDREU</div>
  <div class="login-sub">Portal del Conductor</div>
  <div class="login-card">
    <label class="login-label">Introduce tu matrícula</label>
    <input class="plate-input" id="login-plate" type="text" placeholder="0000 AAA" maxlength="10" autocomplete="off" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')document.getElementById('login-pin').focus()">
    <label class="login-label" style="margin-top:16px;">PIN de acceso</label>
    <input class="plate-input" id="login-pin" type="password" placeholder="••••" maxlength="6" inputmode="numeric" style="font-size:28px;letter-spacing:12px;" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar →</button>
    <label style="display:flex;align-items:center;gap:10px;margin-top:14px;cursor:pointer;color:rgba(255,255,255,0.6);font-size:13px;font-weight:500;">
      <input type="checkbox" id="remember-me" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer;">
      Recordarme en este dispositivo
    </label>
    <div class="login-error" id="login-error">Matrícula no encontrada. Contacta con la oficina.</div>
  </div>
</div>

<!-- ORDERS -->
<div class="screen" id="screen-orders">
  <div class="app-header">
    <div class="app-header-left">
      <div class="app-header-logo">ALMANDREU</div>
      <div class="app-header-driver" id="header-driver">—</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="plate-badge" id="header-plate">—</div>
      <button class="logout-btn" onclick="doLogout()">⏏</button>
    </div>
  </div>
  <div class="sync-bar"><div class="sync-dot" id="sync-dot"></div><span class="sync-text" id="sync-text">Conectando...</span></div>
  <div class="orders-scroll" id="orders-list"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-orders" onclick="showTab('orders')">
      <span class="nav-badge"><span class="nav-icon">📦</span><span class="badge-count" id="pending-count" style="display:none">0</span></span>Pedidos
    </button>
    <button class="nav-btn" id="nav-history" onclick="showTab('history')"><span class="nav-icon">✅</span>Historial</button>
  </nav>
</div>

<!-- HISTORY -->
<div class="screen" id="screen-history">
  <div class="app-header">
    <div class="app-header-left">
      <div class="app-header-logo">ALMANDREU</div>
      <div class="app-header-driver" id="header-driver-h">—</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="plate-badge" id="header-plate-h">—</div>
      <button class="logout-btn" onclick="doLogout()">⏏</button>
    </div>
  </div>
  <div class="sync-bar"><div class="sync-dot" id="sync-dot-h"></div><span class="sync-text" id="sync-text-h">Conectando...</span></div>
  <div class="history-scroll" id="history-list"></div>
  <nav class="bottom-nav">
    <button class="nav-btn" id="nav-orders-h" onclick="showTab('orders')">
      <span class="nav-badge"><span class="nav-icon">📦</span><span class="badge-count" id="pending-count-h" style="display:none">0</span></span>Pedidos
    </button>
    <button class="nav-btn active" id="nav-history-h" onclick="showTab('history')"><span class="nav-icon">✅</span>Historial</button>
  </nav>
</div>

<!-- MODAL KG -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Confirmar entrega</div>
    <div class="modal-subtitle" id="modal-subtitle">—</div>
    <div class="modal-field">
      <label class="modal-label">⚖️ Kilos descargados</label>
      <input class="modal-input" id="modal-kg" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1" oninput="validateModal()">
    </div>
    <div class="modal-warn" id="modal-warn">⚠️ <span id="modal-warn-text"></span></div>
    <button class="modal-submit" id="modal-submit" onclick="submitConfirmation()" disabled>✓ Confirmar entrega</button>
    <button class="modal-cancel" onclick="closeModalDirect()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBBRQ9AofbTXrW-4Hp3Da418CuKGa_X8wA",
  authDomain:"almandreu-60880.firebaseapp.com",
  projectId:"almandreu-60880",
  storageBucket:"almandreu-60880.firebasestorage.app",
  messagingSenderId:"324121566817",
  appId:"1:324121566817:web:19bcbb42b7647727e35420"
});
const db = firebase.firestore();

let currentPlate = null;
let currentVehicle = null;
let confirmingOrderId = null;
let allOrders = [];
let unsubOrders = null;

function setSyncStatus(online) {
  ['sync-dot','sync-dot-h'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.className = 'sync-dot ' + (online ? 'online' : 'offline');
  });
  ['sync-text','sync-text-h'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.textContent = online ? '● En línea' : '● Sin conexión';
  });
}

function doLogin() {
  const plate = document.getElementById('login-plate').value.trim().toUpperCase();
  const pin = document.getElementById('login-pin').value.trim();
  if(!plate || !pin) return;

  // Show loading state
  const btn = document.querySelector('.login-btn');
  btn.textContent = 'Verificando...';
  btn.disabled = true;
  document.getElementById('login-error').classList.remove('show');

  db.collection('vehicles').get().then(snap => {
    const v = snap.docs.map(d => d.data()).find(v => v.plate === plate);
    btn.textContent = 'Entrar →';
    btn.disabled = false;
    if(!v) {
      const errEl = document.getElementById('login-error');
      errEl.textContent = 'Matrícula "' + plate + '" no encontrada. Comprueba que está registrada en la oficina.';
      errEl.classList.add('show');
      document.getElementById('login-plate').style.borderColor = 'rgba(232,58,58,0.6)';
      return;
    }
    if(v.pin && v.pin !== pin) {
      const errEl = document.getElementById('login-error');
      errEl.textContent = 'PIN incorrecto. Contacta con la oficina.';
      errEl.classList.add('show');
      document.getElementById('login-pin').style.borderColor = 'rgba(232,58,58,0.6)';
      return;
    }
    currentPlate = plate;
    currentVehicle = v;
    document.getElementById('login-error').classList.remove('show');
    document.getElementById('login-plate').style.borderColor = '';
    if(document.getElementById('remember-me').checked) {
      localStorage.setItem('alm_plate', plate);
      localStorage.setItem('alm_pin', pin);
    }
    enterApp();
  }).catch(err => {
    btn.textContent = 'Entrar →';
    btn.disabled = false;
    const errEl = document.getElementById('login-error');
    errEl.textContent = 'Error de conexión. Comprueba tu internet e inténtalo de nuevo.';
    errEl.classList.add('show');
  });
}

function enterApp() {
  const name = currentVehicle.driver || 'Conductor';
  ['header-driver','header-driver-h'].forEach(id => document.getElementById(id).textContent = name);
  ['header-plate','header-plate-h'].forEach(id => document.getElementById(id).textContent = currentPlate);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-orders').classList.add('active');
  if(unsubOrders) unsubOrders();
  unsubOrders = db.collection('orders').orderBy('createdAt','desc').onSnapshot(snap => {
    allOrders = snap.docs.map(d => d.data());
    setSyncStatus(true);
    renderOrders();
    renderHistory();
  }, () => setSyncStatus(false));
}

function doLogout() {
  if(unsubOrders) { unsubOrders(); unsubOrders = null; }
  currentPlate = null; currentVehicle = null; allOrders = [];
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('login-plate').value = '';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-plate').style.borderColor = '';
  localStorage.removeItem('alm_plate');
  localStorage.removeItem('alm_pin');
}

function showTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if(tab === 'orders') {
    document.getElementById('screen-orders').classList.add('active');
    document.getElementById('nav-orders').classList.add('active');
    document.getElementById('nav-history').classList.remove('active');
  } else {
    document.getElementById('screen-history').classList.add('active');
    document.getElementById('nav-history-h').classList.add('active');
    document.getElementById('nav-orders-h').classList.remove('active');
  }
}

function renderOrders() {
  const mine = allOrders.filter(o => o.plate === currentPlate && o.status !== 'Entregado');
  ['pending-count','pending-count-h'].forEach(id => {
    const el = document.getElementById(id);
    if(el) { el.textContent = mine.length; el.style.display = mine.length > 0 ? 'flex' : 'none'; }
  });
  const container = document.getElementById('orders-list');
  if(!mine.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-title">¡Todo al día!</div><div class="empty-sub">No tienes pedidos pendientes</div></div>';
    return;
  }
  const grouped = {};
  mine.forEach(o => { const d = o.fecha||'Sin fecha'; if(!grouped[d]) grouped[d]=[]; grouped[d].push(o); });
  let html = '';
  Object.keys(grouped).sort().forEach(date => {
    html += '<div class="day-label">'+formatDayLabel(date)+'</div>';
    grouped[date].forEach(o => { html += buildCard(o); });
  });
  container.innerHTML = html;
}

function buildCard(o) {
  const isUrgent = o.prioridad === 'urgente';
  const isDone = o.status === 'Entregado';
  let bc = 'badge-pending', bt = 'Pendiente';
  if(o.status === 'En tránsito') { bc='badge-transit'; bt='En ruta'; }
  if(isDone) { bc='badge-done'; bt='Entregado'; }
  if(isUrgent && !isDone) { bc='badge-urgent'; bt='🔴 URGENTE'; }

  const codigoHtml = o.codigo ? '<div class="card-codigo"><div><div class="codigo-label">🔑 Código carga/descarga</div><div class="codigo-value">'+o.codigo+'</div></div><button class="copy-btn" onclick="copyCode(\''+o.codigo+'\')">📋 Copiar</button></div>' : '';
  const notasHtml = o.notas ? '<div class="card-notes"><span>📝</span><span>'+o.notas+'</span></div>' : '';
  let actionHtml;
  if(isDone) {
    actionHtml = '<div class="done-summary"><div class="done-summary-title">✓ Entregado</div><div class="done-summary-data">'+(o.kgDelivered ? o.kgDelivered+' kg' : '')+' '+(o.deliveredAt ? '· '+o.deliveredAt : '')+'</div></div>';
  } else if(o.status === 'En tránsito') {
    actionHtml = '<div class="card-action"><button class="confirm-btn" onclick="openModal('+o.id+')">📦 Confirmar entrega</button></div>';
  } else {
    actionHtml = '<div class="card-action"><button class="confirm-btn" style="background:#f5a623;" onclick="markTransit('+o.id+')">🚛 De camino</button></div>';
  }

  return '<div class="order-card '+(isDone?'done':isUrgent?'urgent':'')+'">'+
    '<div class="card-top"><div><div class="card-id">#'+String(o.id).padStart(4,'0')+' · '+(o.mercancia||'Carga general')+'</div><div class="card-client">'+o.cliente+'</div></div><span class="card-badge '+bc+'">'+bt+'</span></div>'+
    '<div class="card-route"><div class="route-row"><span class="route-icon">🔵</span><span class="route-text"><strong>Recogida:</strong> '+o.origen+'</span></div><div class="route-div"></div><div class="route-row"><span class="route-icon">🔴</span><span class="route-text"><strong>Entrega:</strong> '+o.destino+'</span></div></div>'+
    '<div class="card-meta"><div class="meta-item"><span class="meta-label">Peso previsto</span><span class="meta-value">'+(o.peso ? o.peso+' kg' : '—')+'</span></div>'+(o.telefono ? '<div class="meta-item"><span class="meta-label">Tel. cliente</span><span class="meta-value"><a href="tel:'+o.telefono+'" style="color:var(--accent);text-decoration:none;">'+o.telefono+'</a></span></div>' : '')+'<div class="meta-item"><span class="meta-label">Fecha</span><span class="meta-value">'+formatDate(o.fecha)+'</span></div></div>'+
    notasHtml + codigoHtml + actionHtml + '</div>';
}

function renderHistory() {
  const done = allOrders.filter(o => o.plate === currentPlate && o.status === 'Entregado');
  const container = document.getElementById('history-list');
  if(!done.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Sin entregas aún</div><div class="empty-sub">Aquí aparecerán tus entregas confirmadas</div></div>';
    return;
  }
  container.innerHTML = done.map(o =>
    '<div class="hist-card"><div class="hist-icon">✅</div><div class="hist-info"><div class="hist-client">'+o.cliente+'</div><div class="hist-detail">'+o.destino+'</div><div class="hist-detail" style="color:var(--green);margin-top:2px;">'+(o.deliveredAt||'')+'</div></div><div class="hist-kg">'+(o.kgDelivered||'—')+'<span>kg desc.</span></div></div>'
  ).join('');
}

function openModal(orderId) {
  const o = allOrders.find(x => x.id === orderId);
  if(!o) return;
  confirmingOrderId = orderId;
  document.getElementById('modal-title').textContent = 'Entregar a '+o.cliente;
  document.getElementById('modal-subtitle').textContent = o.destino+(o.peso ? ' · Previsto: '+o.peso+' kg' : '');
  document.getElementById('modal-kg').value = '';
  document.getElementById('modal-warn').classList.remove('show');
  document.getElementById('modal-submit').disabled = true;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) { if(e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); confirmingOrderId = null; }

function validateModal() {
  const kg = parseFloat(document.getElementById('modal-kg').value);
  const ok = !isNaN(kg) && kg >= 0;
  document.getElementById('modal-submit').disabled = !ok;
  if(ok && confirmingOrderId) {
    const o = allOrders.find(x => x.id === confirmingOrderId);
    if(o && o.peso) {
      const diff = Math.abs(kg - parseFloat(o.peso));
      const pct = diff / parseFloat(o.peso) * 100;
      const warn = document.getElementById('modal-warn');
      if(pct > 5 && diff > 5) {
        document.getElementById('modal-warn-text').textContent = 'Diferencia de '+diff.toFixed(0)+' kg respecto al previsto ('+o.peso+' kg).';
        warn.classList.add('show');
      } else warn.classList.remove('show');
    }
  }
}

async function markTransit(orderId) {
  try {
    await db.collection('orders').doc(String(orderId)).update({ status: 'En tránsito' });
    showToast('🚛 Marcado como en tránsito');
  } catch(e) { showToast('❌ Error al guardar. Inténtalo de nuevo.'); }
}

async function submitConfirmation() {
  const kg = parseFloat(document.getElementById('modal-kg').value);
  if(isNaN(kg) || !confirmingOrderId) return;
  const now = new Date();
  const time = now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  const date = now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  try {
    await db.collection('orders').doc(String(confirmingOrderId)).update({
      status: 'Entregado', kgDelivered: kg, deliveredAt: date+' '+time
    });
    closeModalDirect();
    showToast('✓ Entrega confirmada · '+kg+' kg');
  } catch(e) { showToast('❌ Error al guardar. Inténtalo de nuevo.'); }
}

function formatDate(d) {
  if(!d) return '—';
  return new Date(d+'T00:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});
}

function formatDayLabel(dateStr) {
  if(!dateStr || dateStr === 'Sin fecha') return 'SIN FECHA';
  const d = new Date(dateStr+'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const tom = new Date(today); tom.setDate(today.getDate()+1);
  if(d.toDateString() === today.toDateString()) return 'HOY — '+d.toLocaleDateString('es-ES',{day:'2-digit',month:'long'}).toUpperCase();
  if(d.toDateString() === tom.toDateString()) return 'MAÑANA — '+d.toLocaleDateString('es-ES',{day:'2-digit',month:'long'}).toUpperCase();
  return d.toLocaleDateString('es-ES',{weekday:'long',day:'2-digit',month:'long'}).toUpperCase();
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => showToast('✓ Código copiado: '+code)).catch(() => showToast('Código: '+code));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('login-plate').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// Auto-login if saved credentials exist
(function autoLogin() {
  const savedPlate = localStorage.getItem('alm_plate');
  const savedPin = localStorage.getItem('alm_pin');
  if(!savedPlate || !savedPin) return;
  const btn = document.querySelector('.login-btn');
  btn.textContent = 'Entrando...';
  btn.disabled = true;
  db.collection('vehicles').get().then(snap => {
    const v = snap.docs.map(d => d.data()).find(v => v.plate === savedPlate);
    btn.textContent = 'Entrar →';
    btn.disabled = false;
    if(!v || (v.pin && v.pin !== savedPin)) {
      localStorage.removeItem('alm_plate');
      localStorage.removeItem('alm_pin');
      return;
    }
    currentPlate = savedPlate;
    currentVehicle = v;
    enterApp();
  }).catch(() => { btn.textContent = 'Entrar →'; btn.disabled = false; });
})();
</script>
